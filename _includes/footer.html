<footer class="site-footer">
  <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. Built with ❤️ and Jekyll.</p>
  <p><a href="https://github.com/somsubhro">GitHub</a></p>
</footer>

<style>
  .site-footer {
    text-align: center;
    padding: 20px;
    background-color: #f8f8f8; /* light gray background */
    font-family: "Playwrite AU QLD", cursive;
    font-optical-sizing: auto;
    font-style: normal;
  }
  .site-footer a {
    color: #0366d6; /* GitHub blue */
    text-decoration: none;
  }
  .site-footer a:hover {
    text-decoration: underline;
  }
</style>

<!-- Mermaid diagram support -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  document.querySelectorAll('code.language-mermaid').forEach(el => {
    const pre = el.parentElement;
    pre.classList.add('mermaid');
    pre.textContent = el.textContent;
  });
  mermaid.initialize({ startOnLoad: true });
</script>

<!-- Load Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+QLD:wght@100..400&display=swap" rel="stylesheet">
